<svg width="900" height="280" viewBox="0 0 900 280" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');

      .bg { fill: #0a0e17; }
      .terminal-chrome { fill: #111827; stroke: #00ff41; stroke-width: 1; }
      .dot-red { fill: #ff5f57; }
      .dot-yellow { fill: #febc2e; }
      .dot-green { fill: #28c840; }
      .scanlines { fill: url(#scanlines); opacity: 0.08; }
      .grid { stroke: #00ff4115; stroke-width: 0.5; }

      .name-text {
        font-family: 'Share Tech Mono', 'Courier New', monospace;
        font-size: 38px;
        font-weight: bold;
        fill: #00ff41;
        filter: url(#glow);
      }
      .sub-text {
        font-family: 'Share Tech Mono', 'Courier New', monospace;
        font-size: 13px;
        fill: #00cc33;
      }
      .dim-text {
        font-family: 'Share Tech Mono', 'Courier New', monospace;
        font-size: 11px;
        fill: #005515;
      }
      .prompt {
        font-family: 'Share Tech Mono', 'Courier New', monospace;
        font-size: 12px;
        fill: #00ff41;
      }
      .label {
        font-family: 'Share Tech Mono', 'Courier New', monospace;
        font-size: 11px;
        fill: #00aa22;
      }
      .value {
        font-family: 'Share Tech Mono', 'Courier New', monospace;
        font-size: 11px;
        fill: #00ff99;
      }
      .border-line { stroke: #00ff41; stroke-width: 1; fill: none; opacity: 0.6; }
      .corner { stroke: #00ff41; stroke-width: 1.5; fill: none; }
      .accent { stroke: #00ff41; stroke-width: 1; fill: none; opacity: 0.3; }
      .bar-bg { fill: #001a08; rx: 2; }
      .bar-fill { fill: #00ff41; }

      /* Matrix rain characters */
      .matrix-char {
        font-family: 'Share Tech Mono', 'Courier New', monospace;
        font-size: 10px;
        fill: #00ff41;
      }

      /* Glitch animation on name */
      @keyframes glitch1 {
        0%, 90%, 100% { transform: translate(0,0); opacity: 1; }
        91% { transform: translate(-3px, 0); opacity: 0.8; }
        93% { transform: translate(3px, 0); opacity: 0.8; }
        95% { transform: translate(-2px, 1px); opacity: 0.9; }
        97% { transform: translate(0,0); opacity: 1; }
      }
      @keyframes glitch2 {
        0%, 88%, 100% { transform: translate(0,0); clip-path: none; opacity: 0; }
        89% { transform: translate(4px, -2px); opacity: 0.6; clip-path: inset(10% 0 60% 0); }
        92% { transform: translate(-3px, 1px); opacity: 0.4; clip-path: inset(50% 0 20% 0); }
        94% { opacity: 0; }
      }
      @keyframes blink {
        0%, 49% { opacity: 1; }
        50%, 100% { opacity: 0; }
      }
      @keyframes scanmove {
        0% { transform: translateY(-280px); }
        100% { transform: translateY(280px); }
      }
      @keyframes fadeIn {
        from { opacity: 0; }
        to { opacity: 1; }
      }
      @keyframes typeIn1 {
        0%, 5% { opacity: 0; }
        10%, 100% { opacity: 1; }
      }
      @keyframes typeIn2 {
        0%, 20% { opacity: 0; }
        25%, 100% { opacity: 1; }
      }
      @keyframes typeIn3 {
        0%, 35% { opacity: 0; }
        40%, 100% { opacity: 1; }
      }
      @keyframes typeIn4 {
        0%, 50% { opacity: 0; }
        55%, 100% { opacity: 1; }
      }
      @keyframes typeIn5 {
        0%, 65% { opacity: 0; }
        70%, 100% { opacity: 1; }
      }
      @keyframes matrixFall1 {
        0% { transform: translateY(-120px); opacity: 0; }
        10% { opacity: 0.7; }
        90% { opacity: 0.3; }
        100% { transform: translateY(300px); opacity: 0; }
      }
      @keyframes matrixFall2 {
        0% { transform: translateY(-80px); opacity: 0; }
        15% { opacity: 0.5; }
        85% { opacity: 0.2; }
        100% { transform: translateY(300px); opacity: 0; }
      }
      @keyframes matrixFall3 {
        0% { transform: translateY(-200px); opacity: 0; }
        20% { opacity: 0.6; }
        80% { opacity: 0.1; }
        100% { transform: translateY(300px); opacity: 0; }
      }
      @keyframes pulse-border {
        0%, 100% { opacity: 0.4; }
        50% { opacity: 1; }
      }
      @keyframes bar-grow {
        0% { width: 0; }
        100% { width: var(--w); }
      }
      @keyframes flicker {
        0%, 97%, 100% { opacity: 1; }
        98% { opacity: 0.4; }
        99% { opacity: 0.9; }
      }

      .name-main { animation: glitch1 8s infinite; }
      .name-ghost { animation: glitch2 8s infinite; fill: #ff00ff; }
      .cursor { animation: blink 1s step-end infinite; }
      .scan-beam { animation: scanmove 4s linear infinite; opacity: 0.06; }
      .line1 { animation: typeIn1 4s ease forwards; }
      .line2 { animation: typeIn2 4s ease forwards; }
      .line3 { animation: typeIn3 4s ease forwards; }
      .line4 { animation: typeIn4 4s ease forwards; }
      .line5 { animation: typeIn5 4s ease forwards; }
      .mc1 { animation: matrixFall1 3s linear infinite; }
      .mc2 { animation: matrixFall2 4.5s linear infinite 0.8s; }
      .mc3 { animation: matrixFall3 3.8s linear infinite 1.5s; }
      .mc4 { animation: matrixFall1 5s linear infinite 0.3s; }
      .mc5 { animation: matrixFall2 3.2s linear infinite 2s; }
      .mc6 { animation: matrixFall3 4.1s linear infinite 1s; }
      .mc7 { animation: matrixFall1 3.6s linear infinite 2.5s; }
      .mc8 { animation: matrixFall2 4.8s linear infinite 0.5s; }
      .pb { animation: pulse-border 3s ease-in-out infinite; }
      .flicker { animation: flicker 6s infinite; }
    </style>

    <!-- Glow filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glow-soft" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Scanlines pattern -->
    <pattern id="scanlines" x="0" y="0" width="900" height="3" patternUnits="userSpaceOnUse">
      <rect width="900" height="1" y="0" fill="#000000"/>
      <rect width="900" height="2" y="1" fill="transparent"/>
    </pattern>

    <!-- Grid pattern -->
    <pattern id="grid" x="0" y="0" width="30" height="30" patternUnits="userSpaceOnUse">
      <path d="M 30 0 L 0 0 0 30" fill="none" stroke="#00ff4112" stroke-width="0.5"/>
    </pattern>

    <clipPath id="mainClip">
      <rect width="900" height="280"/>
    </clipPath>
  </defs>

  <!-- Base background -->
  <rect width="900" height="280" fill="#0a0e17"/>

  <!-- Grid -->
  <rect width="900" height="280" fill="url(#grid)"/>

  <!-- Matrix rain columns — LEFT side -->
  <g clip-path="url(#mainClip)" opacity="0.25">
    <g class="mc1"><text x="18" y="0" class="matrix-char">1</text><text x="18" y="14" class="matrix-char">0</text><text x="18" y="28" class="matrix-char">1</text><text x="18" y="42" class="matrix-char">█</text><text x="18" y="56" class="matrix-char">0</text><text x="18" y="70" class="matrix-char">1</text><text x="18" y="84" class="matrix-char">1</text></g>
    <g class="mc2"><text x="38" y="0" class="matrix-char">0</text><text x="38" y="14" class="matrix-char">1</text><text x="38" y="28" class="matrix-char">0</text><text x="38" y="42" class="matrix-char">1</text><text x="38" y="56" class="matrix-char">█</text><text x="38" y="70" class="matrix-char">0</text></g>
    <g class="mc3"><text x="58" y="0" class="matrix-char">A</text><text x="58" y="14" class="matrix-char">R</text><text x="58" y="28" class="matrix-char">U</text><text x="58" y="42" class="matrix-char">Z</text></g>
    <g class="mc7"><text x="78" y="0" class="matrix-char">1</text><text x="78" y="14" class="matrix-char">1</text><text x="78" y="28" class="matrix-char">0</text><text x="78" y="42" class="matrix-char">1</text><text x="78" y="56" class="matrix-char">0</text></g>
  </g>

  <!-- Matrix rain columns — RIGHT side -->
  <g clip-path="url(#mainClip)" opacity="0.25">
    <g class="mc4"><text x="820" y="0" class="matrix-char">1</text><text x="820" y="14" class="matrix-char">0</text><text x="820" y="28" class="matrix-char">1</text><text x="820" y="42" class="matrix-char">0</text><text x="820" y="56" class="matrix-char">1</text></g>
    <g class="mc5"><text x="845" y="0" class="matrix-char">0</text><text x="845" y="14" class="matrix-char">H</text><text x="845" y="28" class="matrix-char">A</text><text x="845" y="42" class="matrix-char">C</text><text x="845" y="56" class="matrix-char">K</text></g>
    <g class="mc6"><text x="868" y="0" class="matrix-char">1</text><text x="868" y="14" class="matrix-char">0</text><text x="868" y="28" class="matrix-char">1</text><text x="868" y="42" class="matrix-char">1</text><text x="868" y="56" class="matrix-char">0</text><text x="868" y="70" class="matrix-char">1</text></g>
    <g class="mc8"><text x="888" y="0" class="matrix-char">0</text><text x="888" y="14" class="matrix-char">1</text><text x="888" y="28" class="matrix-char">0</text></g>
  </g>

  <!-- Horizontal accent lines -->
  <line x1="0" y1="40" x2="900" y2="40" class="accent"/>
  <line x1="0" y1="240" x2="900" y2="240" class="accent"/>

  <!-- Top bar — terminal chrome -->
  <rect x="0" y="0" width="900" height="40" fill="#0d1420"/>
  <circle cx="22" cy="20" r="6" class="dot-red"/>
  <circle cx="42" cy="20" r="6" class="dot-yellow"/>
  <circle cx="62" cy="20" r="6" class="dot-green"/>
  <text x="450" y="25" text-anchor="middle" class="dim-text" style="font-size:11px;">herachxx@github — bash — 900×280</text>
  <!-- Top bar right -->
  <text x="870" y="25" text-anchor="end" class="dim-text">⬡ ONLINE</text>

  <!-- MAIN CONTENT AREA -->

  <!-- LEFT PANEL: Name + typing lines -->
  <g class="flicker">

    <!-- Prompt line -->
    <text x="110" y="75" class="prompt">┌──[<tspan fill="#00ff99">herachxx</tspan><tspan fill="#00ff41">@aktobe</tspan>]──[~]</text>
    <text x="110" y="92" class="prompt">└─$ </text>

    <!-- GLITCH NAME -->
    <g transform="translate(148, 92)">
      <text class="name-ghost" y="0" style="font-family:'Share Tech Mono','Courier New',monospace;font-size:38px;font-weight:bold;">ARUZHAN.EXE</text>
      <text class="name-main" y="0" style="font-family:'Share Tech Mono','Courier New',monospace;font-size:38px;font-weight:bold;fill:#00ff41;filter:url(#glow);">ARUZHAN.EXE</text>
    </g>

    <!-- Cursor after name -->
    <rect x="530" y="60" width="3" height="36" fill="#00ff41" class="cursor"/>

    <!-- Info lines -->
    <g class="line1">
      <text x="110" y="130" class="label">▸ <tspan fill="#555">role</tspan>      <tspan fill="#00ff99">Aspiring Ethical Hacker · NSRI Director</tspan></text>
    </g>
    <g class="line2">
      <text x="110" y="148" class="label">▸ <tspan fill="#555">location</tspan>  <tspan fill="#00ff99">Aktobe, Kazakhstan 🇰🇿 · UTC+5</tspan></text>
    </g>
    <g class="line3">
      <text x="110" y="166" class="label">▸ <tspan fill="#555">school</tspan>    <tspan fill="#00ff99">AIS · Grade 10 · GPA 4.7/5.0 · 2027</tspan></text>
    </g>
    <g class="line4">
      <text x="110" y="184" class="label">▸ <tspan fill="#555">weapons</tspan>   <tspan fill="#00ff99">Python · C++ · Kali · Arduino · Lua</tspan></text>
    </g>
    <g class="line5">
      <text x="110" y="202" class="label">▸ <tspan fill="#555">target</tspan>    <tspan fill="#00ff41" filter="url(#glow-soft)">MIT — Cybersecurity — 2027 🎯</tspan></text>
    </g>

  </g>

  <!-- DIVIDER -->
  <line x1="620" y1="50" x2="620" y2="235" stroke="#00ff41" stroke-width="0.5" opacity="0.4"/>

  <!-- RIGHT PANEL: Stats dashboard -->
  <g class="flicker">

    <text x="640" y="72" class="sub-text" style="font-size:10px;fill:#005515;">// SYSTEM STATUS</text>

    <!-- Skill bars -->
    <text x="640" y="92" class="label" style="font-size:10px;">CYBERSECURITY</text>
    <rect x="640" y="97" width="220" height="6" fill="#001a08" rx="1"/>
    <rect x="640" y="97" width="154" height="6" fill="#00ff41" rx="1" style="animation: bar-grow 2s ease 0.5s both;" class="pb">
      <animate attributeName="width" from="0" to="154" dur="2s" begin="0.5s" fill="freeze"/>
    </rect>
    <text x="868" y="104" class="label" style="font-size:9px;" text-anchor="end">70%</text>

    <text x="640" y="118" class="label" style="font-size:10px;">COMP PROGRAMMING</text>
    <rect x="640" y="123" width="220" height="6" fill="#001a08" rx="1"/>
    <rect x="640" y="123" width="176" height="6" fill="#00cc33" rx="1">
      <animate attributeName="width" from="0" to="176" dur="2s" begin="0.8s" fill="freeze"/>
    </rect>
    <text x="868" y="130" class="label" style="font-size:9px;" text-anchor="end">80%</text>

    <text x="640" y="144" class="label" style="font-size:10px;">MATHEMATICS</text>
    <rect x="640" y="149" width="220" height="6" fill="#001a08" rx="1"/>
    <rect x="640" y="149" width="187" height="6" fill="#00aa22" rx="1">
      <animate attributeName="width" from="0" to="187" dur="2s" begin="1.1s" fill="freeze"/>
    </rect>
    <text x="868" y="156" class="label" style="font-size:9px;" text-anchor="end">85%</text>

    <text x="640" y="170" class="label" style="font-size:10px;">DRONE OPERATING</text>
    <rect x="640" y="175" width="220" height="6" fill="#001a08" rx="1"/>
    <rect x="640" y="175" width="165" height="6" fill="#009918" rx="1">
      <animate attributeName="width" from="0" to="165" dur="2s" begin="1.4s" fill="freeze"/>
    </rect>
    <text x="868" y="182" class="label" style="font-size:9px;" text-anchor="end">75%</text>

    <text x="640" y="196" class="label" style="font-size:10px;">ELECTRONICS / HW</text>
    <rect x="640" y="201" width="220" height="6" fill="#001a08" rx="1"/>
    <rect x="640" y="201" width="132" height="6" fill="#006611" rx="1">
      <animate attributeName="width" from="0" to="132" dur="2s" begin="1.7s" fill="freeze"/>
    </rect>
    <text x="868" y="208" class="label" style="font-size:9px;" text-anchor="end">60%</text>

    <!-- MIT progress -->
    <text x="640" y="227" class="sub-text" style="font-size:9px;fill:#005515;">// MIT ADMISSION PROGRESS</text>
    <rect x="640" y="230" width="220" height="4" fill="#001a08" rx="1"/>
    <rect x="640" y="230" width="88" height="4" rx="1" fill="#00ff41" opacity="0.9">
      <animate attributeName="width" from="0" to="88" dur="3s" begin="2s" fill="freeze"/>
      <animate attributeName="opacity" values="0.5;1;0.5" dur="2s" repeatCount="indefinite"/>
    </rect>
    <text x="868" y="236" class="label" style="font-size:9px;" text-anchor="end">40% 🎯</text>

  </g>

  <!-- Corner decorations -->
  <path d="M 5 45 L 5 5 L 110 5" class="corner" opacity="0"/>
  <path d="M 895 45 L 895 5 L 790 5" class="corner" opacity="0"/>

  <!-- Bottom bar -->
  <rect x="0" y="240" width="900" height="40" fill="#0d1420"/>
  <text x="110" y="265" class="dim-text">[ CTF_PLAYER ] [ DRONE_PILOT ] [ LOCKPICKER ] [ SPEEDCUBER ] [ JUGGLER ]</text>
  <text x="870" y="265" class="dim-text" text-anchor="end">v2027.MIT</text>

  <!-- Scanline overlay -->
  <rect width="900" height="280" fill="url(#scanlines)" opacity="0.06"/>

  <!-- Moving scan beam -->
  <rect class="scan-beam" width="900" height="60" fill="url(#scanlines)" y="0"/>

  <!-- Top border glow -->
  <line x1="0" y1="0" x2="900" y2="0" stroke="#00ff41" stroke-width="2" opacity="0.8"/>
  <line x1="0" y1="279" x2="900" y2="279" stroke="#00ff41" stroke-width="2" opacity="0.8"/>
</svg>

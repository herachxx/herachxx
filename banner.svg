<svg xmlns="http://www.w3.org/2000/svg" width="860" height="300" viewBox="0 0 860 300">
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-sm">
      <feGaussianBlur stdDeviation="1.2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="grid" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#00ff4114" stroke-width="0.6"/>
    </pattern>
    <linearGradient id="fadeL" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0a0e17"/>
      <stop offset="18%" stop-color="#0a0e1700"/>
    </linearGradient>
    <linearGradient id="fadeR" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="82%" stop-color="#0a0e1700"/>
      <stop offset="100%" stop-color="#0a0e17"/>
    </linearGradient>
    <clipPath id="clip"><rect width="860" height="300"/></clipPath>
    <clipPath id="content-clip"><rect x="100" y="0" width="660" height="300"/></clipPath>
  </defs>

  <!-- BG -->
  <rect width="860" height="300" fill="#0a0e17"/>
  <rect width="860" height="300" fill="url(#grid)"/>

  <!-- MATRIX RAIN COLUMNS -->
  <g clip-path="url(#clip)" font-family="'Courier New',Courier,monospace" font-size="11" fill="#00ff41">

    <!-- col 1 -->
    <g opacity="0.22">
      <text x="14" y="0">1</text><text x="14" y="14">0</text><text x="14" y="28">1</text>
      <text x="14" y="42">1</text><text x="14" y="56">0</text><text x="14" y="70">1</text>
      <text x="14" y="84">0</text><text x="14" y="98">1</text><text x="14" y="112">1</text>
      <animateTransform attributeName="transform" type="translate" from="0,-140" to="0,300" dur="3.1s" repeatCount="indefinite"/>
    </g>
    <!-- col 2 -->
    <g opacity="0.15">
      <text x="34" y="0">A</text><text x="34" y="14">R</text><text x="34" y="28">U</text>
      <text x="34" y="42">Z</text><text x="34" y="56">H</text><text x="34" y="70">A</text>
      <text x="34" y="84">N</text>
      <animateTransform attributeName="transform" type="translate" from="0,-60" to="0,300" dur="4.2s" begin="-1.1s" repeatCount="indefinite"/>
    </g>
    <!-- col 3 -->
    <g opacity="0.18">
      <text x="54" y="0">0</text><text x="54" y="14">1</text><text x="54" y="28">0</text>
      <text x="54" y="42">0</text><text x="54" y="56">1</text><text x="54" y="70">1</text>
      <text x="54" y="84">0</text><text x="54" y="98">1</text>
      <animateTransform attributeName="transform" type="translate" from="0,-90" to="0,300" dur="3.7s" begin="-0.5s" repeatCount="indefinite"/>
    </g>
    <!-- col 4 -->
    <g opacity="0.12">
      <text x="74" y="0">K</text><text x="74" y="14">A</text><text x="74" y="28">Z</text>
      <text x="74" y="42">A</text><text x="74" y="56">K</text><text x="74" y="70">H</text>
      <animateTransform attributeName="transform" type="translate" from="0,-200" to="0,300" dur="5s" begin="-2s" repeatCount="indefinite"/>
    </g>

    <!-- col right 1 -->
    <g opacity="0.22">
      <text x="790" y="0">1</text><text x="790" y="14">0</text><text x="790" y="28">1</text>
      <text x="790" y="42">0</text><text x="790" y="56">1</text><text x="790" y="70">1</text>
      <text x="790" y="84">0</text><text x="790" y="98">1</text>
      <animateTransform attributeName="transform" type="translate" from="0,-100" to="0,300" dur="3.4s" begin="-0.8s" repeatCount="indefinite"/>
    </g>
    <!-- col right 2 -->
    <g opacity="0.15">
      <text x="810" y="0">H</text><text x="810" y="14">A</text><text x="810" y="28">C</text>
      <text x="810" y="42">K</text><text x="810" y="56">E</text><text x="810" y="70">R</text>
      <animateTransform attributeName="transform" type="translate" from="0,-50" to="0,300" dur="4.6s" begin="-1.8s" repeatCount="indefinite"/>
    </g>
    <!-- col right 3 -->
    <g opacity="0.18">
      <text x="830" y="0">0</text><text x="830" y="14">1</text><text x="830" y="28">1</text>
      <text x="830" y="42">0</text><text x="830" y="56">1</text><text x="830" y="70">0</text>
      <text x="830" y="84">1</text>
      <animateTransform attributeName="transform" type="translate" from="0,-160" to="0,300" dur="3.9s" begin="-0.3s" repeatCount="indefinite"/>
    </g>
    <!-- col right 4 -->
    <g opacity="0.12">
      <text x="850" y="0">M</text><text x="850" y="14">I</text><text x="850" y="28">T</text>
      <text x="850" y="42">2</text><text x="850" y="56">0</text><text x="850" y="70">2</text><text x="850" y="84">7</text>
      <animateTransform attributeName="transform" type="translate" from="0,-80" to="0,300" dur="4.8s" begin="-2.5s" repeatCount="indefinite"/>
    </g>
  </g>

  <!-- fade edges over matrix rain -->
  <rect width="860" height="300" fill="url(#fadeL)"/>
  <rect width="860" height="300" fill="url(#fadeR)"/>

  <!-- TOP BAR -->
  <rect x="0" y="0" width="860" height="38" fill="#0d1520"/>
  <rect x="0" y="37" width="860" height="1" fill="#00ff41" opacity="0.5"/>
  <!-- macOS dots -->
  <circle cx="20" cy="19" r="6" fill="#ff5f57"/>
  <circle cx="40" cy="19" r="6" fill="#febc2e"/>
  <circle cx="60" cy="19" r="6" fill="#28c840"/>
  <!-- title -->
  <text x="430" y="24" text-anchor="middle" font-family="'Courier New',Courier,monospace" font-size="11" fill="#3a5a3a">herachxx@aktobe - bash -</text>
  <!-- status dot -->
  <circle cx="820" cy="19" r="4" fill="#00ff41">
    <animate attributeName="opacity" values="1;0.3;1" dur="2s" repeatCount="indefinite"/>
  </circle>
  <text x="830" y="24" font-family="'Courier New',Courier,monospace" font-size="10" fill="#3a5a3a">LIVE</text>

  <!-- BOTTOM BAR -->
  <rect x="0" y="262" width="860" height="1" fill="#00ff41" opacity="0.5"/>
  <rect x="0" y="263" width="860" height="37" fill="#0d1520"/>
  <text x="130" y="285" font-family="'Courier New',Courier,monospace" font-size="10" fill="#2a4a2a">[ CTF_PLAYER ] [ DRONE_PILOT ] [ LOCKPICKER ] [ SPEEDCUBER ] [ JUGGLER ] [ PAPERCRAFT ]</text>
  <text x="730" y="285" font-family="'Courier New',Courier,monospace" font-size="10" fill="#2a4a2a">v2027</text>

  <!-- OUTER BORDER -->
  <rect x="1" y="1" width="858" height="298" fill="none" stroke="#00ff41" stroke-width="1.5" opacity="0.6"/>

  <!-- VERTICAL DIVIDER -->
  <line x1="570" y1="48" x2="570" y2="252" stroke="#00ff41" stroke-width="0.8" opacity="0.35"/>

  <!-- LEFT PANEL -->

  <!-- prompt line: sits just below top bar -->
  <text x="110" y="62" font-family="'Courier New',Courier,monospace" font-size="12" fill="#00ff41">┌─[<tspan fill="#00ffaa">herachxx</tspan><tspan fill="#00ff41">@aktobe</tspan>]─[~]</text>
  <text x="110" y="78" font-family="'Courier New',Courier,monospace" font-size="12" fill="#00ff41">└─$ </text>

  <!-- BIG NAME — clearly below the prompt on its own line -->
  <text x="148" y="115" font-family="'Courier New',Courier,monospace" font-size="36" font-weight="bold" fill="#003308" filter="url(#glow)">HERACH.EXE</text>
  <text x="148" y="115" font-family="'Courier New',Courier,monospace" font-size="36" font-weight="bold" fill="#00ff41" filter="url(#glow)">HERACH.EXE
    <animate attributeName="x" values="148;145;151;148;148;148;148;148;148;148" dur="7s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="1;1;1;1;1;1;1;0.7;1;1" dur="7s" repeatCount="indefinite"/>
  </text>
  <!-- glitch ghost -->
  <text x="148" y="115" font-family="'Courier New',Courier,monospace" font-size="36" font-weight="bold" fill="#ff00ff" opacity="0">HERACH.EXE
    <animate attributeName="opacity" values="0;0;0;0;0;0;0;0.4;0;0" dur="7s" repeatCount="indefinite"/>
    <animate attributeName="x" values="148;148;148;148;148;148;148;153;148;148" dur="7s" repeatCount="indefinite"/>
  </text>

  <!-- blinking cursor — right of name, same baseline -->
  <rect x="420" y="83" width="3" height="34" fill="#00ff41">
    <animate attributeName="opacity" values="1;1;1;0;0;0;1;1" dur="1.2s" repeatCount="indefinite"/>
  </rect>

  <!-- info lines — shifted down to sit below the large name -->
  <g font-family="'Courier New',Courier,monospace" font-size="11.5" filter="url(#glow-sm)">

    <text x="110" y="140" fill="#00ff41">
      <tspan fill="#2a5a2a">▸ role      </tspan><tspan fill="#00ffaa">Ethical Hacker · NSRI Director</tspan>
      <animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.1;0.2;1" dur="4s" fill="freeze"/>
    </text>

    <text x="110" y="157" fill="#00ff41">
      <tspan fill="#2a5a2a">▸ location  </tspan><tspan fill="#00ffaa">Aktobe, Kazakhstan · UTC+5</tspan>
      <animate attributeName="opacity" values="0;0;0;1;1" keyTimes="0;0.15;0.25;0.35;1" dur="4s" fill="freeze"/>
    </text>

    <text x="110" y="174" fill="#00ff41">
      <tspan fill="#2a5a2a">▸ school    </tspan><tspan fill="#00ffaa">AIS · 10th grade · GPA 4.7 · 2027</tspan>
      <animate attributeName="opacity" values="0;0;0;0;1;1" keyTimes="0;0.2;0.3;0.4;0.5;1" dur="4s" fill="freeze"/>
    </text>

    <text x="110" y="191" fill="#00ff41">
      <tspan fill="#2a5a2a">▸ weapons   </tspan><tspan fill="#00ffaa">Linux · C++ · Python · RaspberryPi</tspan>
      <animate attributeName="opacity" values="0;0;0;0;0;1;1" keyTimes="0;0.25;0.35;0.45;0.55;0.65;1" dur="4s" fill="freeze"/>
    </text>

    <text x="110" y="208" fill="#00ff41" filter="url(#glow)">
      <tspan fill="#2a5a2a">▸ target    </tspan><tspan fill="#00ff41">MIT · cybersecurity · 2027</tspan>
      <animate attributeName="opacity" values="0;0;0;0;0;0;1;1" keyTimes="0;0.3;0.4;0.5;0.6;0.7;0.8;1" dur="4s" fill="freeze"/>
    </text>

    <text x="110" y="225" fill="#00ff41">
      <tspan fill="#2a5a2a">▸ languages </tspan><tspan fill="#00ffaa">English · Russian · Kazakh</tspan>
      <animate attributeName="opacity" values="0;0;0;0;0;0;0;1;1" keyTimes="0;0.35;0.45;0.55;0.65;0.75;0.85;0.9;1" dur="4s" fill="freeze"/>
    </text>

  </g>

  <!-- RIGHT PANEL — skill bars -->
  
  <g font-family="'Courier New',Courier,monospace" font-size="10">

    <text x="590" y="72" fill="#1a4a1a" font-size="10">// SKILL MATRIX</text>

    <!-- CYBERSECURITY -->
    <text x="590" y="92" fill="#3a7a3a">CYBERSECURITY</text>
    <rect x="590" y="96" width="230" height="7" fill="#010f04" rx="2"/>
    <rect x="590" y="96" height="7" fill="#00ff41" rx="2">
      <animate attributeName="width" from="0" to="161" dur="1.8s" begin="0.4s" fill="freeze"/>
    </rect>
    <text x="828" y="104" fill="#00ff41" text-anchor="end" font-size="9">80%</text>

    <!-- COMP PROGRAMMING -->
    <text x="590" y="118" fill="#3a7a3a">COMPETITIVE PROGRAMMING</text>
    <rect x="590" y="122" width="230" height="7" fill="#010f04" rx="2"/>
    <rect x="590" y="122" height="7" fill="#00dd33" rx="2">
      <animate attributeName="width" from="0" to="184" dur="1.8s" begin="0.7s" fill="freeze"/>
    </rect>
    <text x="828" y="130" fill="#00dd33" text-anchor="end" font-size="9">60%</text>

    <!-- MATHEMATICS -->
    <text x="590" y="144" fill="#3a7a3a">MATHEMATICS</text>
    <rect x="590" y="148" width="230" height="7" fill="#010f04" rx="2"/>
    <rect x="590" y="148" height="7" fill="#00bb22" rx="2">
      <animate attributeName="width" from="0" to="196" dur="1.8s" begin="1s" fill="freeze"/>
    </rect>
    <text x="828" y="156" fill="#00bb22" text-anchor="end" font-size="9">85%</text>

    <!-- DRONE OPS -->
    <text x="590" y="170" fill="#3a7a3a">DRONE OPERATING</text>
    <rect x="590" y="174" width="230" height="7" fill="#010f04" rx="2"/>
    <rect x="590" y="174" height="7" fill="#009911" rx="2">
      <animate attributeName="width" from="0" to="172" dur="1.8s" begin="1.3s" fill="freeze"/>
    </rect>
    <text x="828" y="182" fill="#009911" text-anchor="end" font-size="9">90%</text>

    <!-- ELECTRONICS -->
    <text x="590" y="196" fill="#3a7a3a">ELECTRONICS / HW</text>
    <rect x="590" y="200" width="230" height="7" fill="#010f04" rx="2"/>
    <rect x="590" y="200" height="7" fill="#007708" rx="2">
      <animate attributeName="width" from="0" to="138" dur="1.8s" begin="1.6s" fill="freeze"/>
    </rect>
    <text x="828" y="208" fill="#007708" text-anchor="end" font-size="9">60%</text>

    <!-- MIT GOAL -->
    <text x="590" y="228" fill="#1a4a1a" font-size="9">// MIT ADMISSION GOAL</text>
    <rect x="590" y="233" width="230" height="5" fill="#010f04" rx="2"/>
    <rect x="590" y="233" height="5" fill="#00ff41" rx="2" opacity="0.9">
      <animate attributeName="width" from="0" to="92" dur="2.5s" begin="2s" fill="freeze"/>
      <animate attributeName="opacity" values="0.9;0.5;0.9" dur="1.8s" begin="4.5s" repeatCount="indefinite"/>
    </rect>
    <text x="828" y="240" fill="#00ff41" text-anchor="end" font-size="9">
      40%
      <animate attributeName="opacity" values="1;0.4;1" dur="1.8s" begin="4.5s" repeatCount="indefinite"/>
    </text>

  </g>

  <!-- scanline overlay -->
  <rect width="860" height="300" fill="none" opacity="0.04">
    <animate attributeName="y" values="0;300" dur="5s" repeatCount="indefinite"/>
  </rect>

</svg>
